<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>AIoT 控制面板</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* 保持您原始的所有樣式不變 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: #1a1a1a; color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; }
        body::before { content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: url('./Bg_JackalAIoT.jpg') no-repeat center center; background-size: cover; z-index: -1; }
        .top-padding-spacer { width: 100%; height: 410px; }
        .container { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 25px 20px; border-radius: 24px; width: 90%; max-width: 400px; border: 1px solid rgba(255, 255, 255, 0.2); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 100px; }
        h2 { font-size: 22px; margin-bottom: 20px; font-weight: 600; color: #4a90e2; }
        .number-box { font-size: 48px; font-weight: 800; margin: 20px 0; color: #fff; text-shadow: 0 0 15px rgba(74, 144, 226, 0.8); }
        .ui-element { width: 100%; padding: 15px; margin: 10px 0; border-radius: 14px; border: none; font-size: 16px; outline: none; transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 12px; }
        input[type="text"] { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.3); color: white; text-align: center; }
        .btn { cursor: pointer; font-weight: 600; color: white; text-decoration: none; }
        .btn-blue { background: linear-gradient(135deg, #4a90e2, #357abd); }
        .btn-green { background: linear-gradient(135deg, #4caf50, #388e3c); }
        .btn-gray { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2); }
        .tap-target:active { transform: scale(0.95); opacity: 0.8; }
        .nav-bar { position: fixed; bottom: 25px; width: 90%; max-width: 400px; background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(25px); height: 65px; border-radius: 32px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255, 255, 255, 0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.3); }
        .nav-item { color: rgba(255, 255, 255, 0.6); text-decoration: none; text-align: center; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item span { font-size: 10px; }
        .nav-item.active { color: #4a90e2; }
    </style>
</head>
<body>
    <div class="top-padding-spacer"></div>
    <div class="container">
        <h2>系統連線測試</h2>
        <div class="number-box" id="numberDisplay">--</div>
        <button class="ui-element btn btn-blue tap-target" onclick="fetchRandomNumber()">
            <i class="fas fa-sync-alt"></i> 請求後端隨機數
        </button>
        <hr style="margin: 20px 0; opacity: 0.2;">
        <input type="text" id="userDataInput" class="ui-element" placeholder="輸入測試筆記...">
        <button class="ui-element btn btn-green tap-target" onclick="submitUserData()">
            <i class="fas fa-paper-plane"></i> 提交數據
        </button>
        <button class="ui-element btn btn-gray tap-target" onclick="document.getElementById('fileInput').click()">
            <i class="fas fa-cloud-upload-alt"></i> 測試文件上傳
        </button>
        <input type="file" id="fileInput" style="display: none;" onchange="uploadFile(this.files[0])">
        <a href="index.html" class="ui-element btn btn-gray tap-target" style="margin-top: 20px;">
            <i class="fas fa-home"></i> 返回首頁
        </a>
    </div>
    <nav class="nav-bar">
        <a href="index.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="alerts.html" class="nav-item"><i class="fas fa-bell"></i><span>Alerts</span></a>
        <div class="nav-item active"><i class="fas fa-tools"></i><span>Test</span></div>
        <a href="about.html" class="nav-item"><i class="fas fa-info-circle"></i><span>About</span></a>
    </nav>

    <script>
        const API_URL = window.location.origin;

        async function fetchRandomNumber() {
            try {
                const res = await fetch(`${API_URL}/`, { cache: 'no-cache' });
                const data = await res.json();
                document.getElementById('numberDisplay').innerText = data;
            } catch (e) { document.getElementById('numberDisplay').innerText = "Err"; }
        }

        async function submitUserData() {
            const inputEl = document.getElementById('userDataInput');
            const val = inputEl.value;
            if (!val) return;
            try {
                const res = await fetch(`${API_URL}/list`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ note: val })
                });
                if (res.ok) {
                    alert("已成功寫入警報列表");
                    inputEl.value = '';
                }
            } catch (e) { alert("提交失敗"); }
        }

        async function uploadFile(file) {
            if (!file) return;
            const formData = new FormData();
            formData.append('file', file);
            try {
                const res = await fetch(`${API_URL}/upload`, { method: 'POST', body: formData });
                if (res.ok) alert("文件已記錄至警報");
            } catch (e) { alert("上傳失敗"); }
        }
    </script>
</body>
</html>
